name: Build packaged binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
    - name: Cache Electron binaries
      uses: actions/cache@v4
      with:
        path: ~/.cache/electron
        key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
    - name: Install system dependencies for x64->ia32 cross-build
      run: |
        sudo apt update
        sudo apt install -y libc6-dev-i386 gcc-multilib g++-multilib
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install build deps
      run: npm install
    - name: Build for x64
      run: ./node_modules/.bin/electron-builder build -l --x64
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/upload-artifact@v4
      with:
        name: Linux-AppImages
        path: dist/*.AppImage
        if-no-files-found: error

  build-darwin:
    # Use macos-13 (Intel x64) to match the x64 build target in package.json.
    # Native modules must be built on the same architecture as the target.
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
    - name: Cache Electron binaries
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/electron
        key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install root build tools
      run: npm install
    - name: Build macOS DMG
      run: npm run build-darwin
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/upload-artifact@v4
      with:
        name: macOS-DMG
        path: dist/*.dmg
        if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/AppData/Local/npm-cache
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
    - name: Cache Electron binaries
      uses: actions/cache@v4
      with:
        path: ~/AppData/Local/electron/Cache
        key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install build deps
      run: npm install
    - name: Run prebuild
      run: |
        New-Item -ItemType Directory -Force -Path prebuild-src
        Copy-Item -Path src\* -Destination prebuild-src\ -Recurse -Force -Exclude node_modules
        node prebuild-minify.js
        Set-Location prebuild-src
        npm install --ignore-scripts
      shell: pwsh
    - name: Build Windows installer
      run: node_modules\.bin\electron-builder build -w
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: dist/*.exe
        if-no-files-found: error
