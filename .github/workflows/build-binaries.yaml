name: Build packaged binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
    - name: Cache Electron binaries
      uses: actions/cache@v4
      with:
        path: ~/.cache/electron
        key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install root build tools
      run: npm ci
    - name: Run prebuild
      run: npm run prebuild-linux
    - name: Rebuild node-pty for Electron
      run: |
        ELECTRON_VER=$(node -e "console.log(require('./node_modules/electron/package.json').version)")
        ./node_modules/.bin/electron-rebuild -f -w node-pty -m prebuild-src --version $ELECTRON_VER --arch x64
    - name: Build AppImage (x64)
      run: ./node_modules/.bin/electron-builder build -l --x64
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/upload-artifact@v4
      with:
        name: Linux-AppImage
        path: dist/*.AppImage
        if-no-files-found: error

  build-darwin:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
    - name: Cache Electron binaries
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/electron
        key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install root build tools
      run: npm ci
    - name: Run prebuild
      run: npm run prebuild-darwin
    - name: Rebuild node-pty for Electron
      run: |
        ELECTRON_VER=$(node -e "console.log(require('./node_modules/electron/package.json').version)")
        ./node_modules/.bin/electron-rebuild -f -w node-pty -m prebuild-src --version $ELECTRON_VER --arch x64
    - name: Build macOS DMG
      run: ./node_modules/.bin/electron-builder build -m
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/upload-artifact@v4
      with:
        name: macOS-DMG
        path: dist/*.dmg
        if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/AppData/Local/npm-cache
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
    - name: Cache Electron binaries
      uses: actions/cache@v4
      with:
        path: ~/AppData/Local/electron/Cache
        key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install root build tools
      run: npm ci
    - name: Run prebuild
      run: npm run prebuild-windows
    - name: Rebuild node-pty for Electron
      run: |
        $electronVer = node -e "console.log(require('./node_modules/electron/package.json').version)"
        node_modules\.bin\electron-rebuild -f -w node-pty -m prebuild-src --version $electronVer --arch x64
      shell: pwsh
    - name: Build Windows installer
      run: node_modules\.bin\electron-builder build -w
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: dist/*.exe
        if-no-files-found: error
